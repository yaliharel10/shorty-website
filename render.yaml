# Free hosting on Render — use Vercel + Turso for production (see README)

services:
  - type: web
    name: shorty
    runtime: node
    plan: free
    healthCheckPath: /health
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npx tsx scripts/seed-if-empty.ts && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        value: file:./prisma/render.db
      - key: JWT_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_SITE_URL
        value: https://shorty-hhgo.onrender.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
      - key: SEED_DEMO_USERS
        value: "false"
