# Free hosting on Render (https://render.com)
# New → Blueprint → connect yaliharel10/shorty-website
#
# Free tier: no persistent disk — SQLite lives in the container filesystem.
# Demo data is re-seeded on every deploy (build runs db:seed).
# User signups persist until the next deploy or cold restart.
#
# Free tier also spins down after ~15 min idle (~30–50s cold start).

services:
  - type: web
    name: shorty
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run db:seed && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        value: file:./prisma/render.db
      - key: JWT_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
