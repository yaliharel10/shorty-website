# Free hosting on Render (https://render.com)
# Connect your GitHub repo → New Web Service → Render reads this file automatically.
#
# Note: Free tier spins down after inactivity (~50s cold start).
# SQLite persists on the attached disk below.

services:
  - type: web
    name: shorty
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run db:seed && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        value: file:/var/data/shorty.db
      - key: JWT_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
    disk:
      name: shorty-data
      mountPath: /var/data
      sizeGB: 1
